  name: PLM-CTT "Shuttle Cutter" machine board
  description: A machine printed circuit board for an PLM-CTT "Shuttle Cutter".
  suffix: Machine Board
  components:
  - type: Sprite
    state: security
  - type: MachineBoard
    prototype: ShuttleGunPlasmaCutter
    stackRequirements:
      MatterBin: 2
      Manipulator: 3
      Capacitor: 2
      Steel: 5
      Glass: 2
      CableHV: 3
      Gold: 1

