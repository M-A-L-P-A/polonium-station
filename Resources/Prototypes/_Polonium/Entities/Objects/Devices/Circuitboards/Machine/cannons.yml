- type: entity
  id: ShuttleGunSeismicCircuitboard
  parent: BaseMachineCircuitboard
  name: EXP-SMC "KosmoWstrząs" machine board
  description: A machine printed circuit board for an EXP-SMC "KosmoWstrząs".
  suffix: Machine Board
  components:
  - type: Sprite
    state: security
  - type: MachineBoard
    prototype: ShuttleGunSeismic
    stackRequirements:
      MatterBin: 2
      Manipulator: 1
      Steel: 5
      CableHV: 1

- type: entity
  id: ShuttleGunPlasmaCutterCircuitboard
